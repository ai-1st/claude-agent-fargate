<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ClaudeClaw</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      --bg: #fafafa;
      --fg: #111;
      --card-bg: #ffffff;
      --card-border: #dddddd;
      --muted: #5a5a5a;
      --code-bg: rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #ececec;
        --card-bg: #242424;
        --card-border: #3a3a3a;
        --muted: #b0b0b0;
        --code-bg: rgba(255,255,255,0.10);
      }
    }
    body { margin: 0; padding: 12px; background: var(--bg); color: var(--fg); }
    h1 { font-size: 16px; margin: 0 0 4px 0; display: flex; align-items: center; gap: 8px; color: var(--fg); }
    h2 { font-size: 13px; font-weight: 600; margin: 14px 0 6px 0; text-transform: uppercase; opacity: 0.75; letter-spacing: 0.05em; color: var(--fg); }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 6px; padding: 10px; margin-bottom: 8px; color: var(--fg); }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; display: inline-block; }
    .dot.working { background: #1e88e5; animation: pulse 1.2s infinite; }
    .dot.needs_human { background: #fbc02d; animation: pulse 1.2s infinite; }
    .dot.idle { background: #607d8b; }
    .dot.unbound { background: #777; opacity: 0.4; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .muted { color: var(--muted); font-size: 12px; }
    code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; background: var(--code-bg); padding: 1px 4px; border-radius: 3px; }
    button { cursor: pointer; padding: 6px 10px; border-radius: 4px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--fg); font-size: 13px; }
    button.danger { border-color: #d32f2f; color: #ef5350; }
  </style>
</head>
<body>
  <h1>
    <span class="dot unbound" id="statusDot"></span>
    <span id="headerTitle">ClaudeClaw</span>
  </h1>
  <div id="headerSubtitle" class="muted" style="margin-bottom: 12px;"></div>

  <div id="boundCard" class="card" style="display:none;">
    <div><strong>Session:</strong> <code id="sid"></code></div>
    <div class="muted" id="lastPoll" style="margin-top:6px;"></div>
    <div class="muted" id="pollError" style="margin-top:4px; color:#c62828;"></div>
    <div style="margin-top: 10px;"><button class="danger" id="unbindBtn">Unbind</button></div>
  </div>

  <div id="unboundCard" class="card">
    <p>This extension activates per-session: open a session in the ClaudeClaw web UI and click <strong>Open in Extension</strong>.</p>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
