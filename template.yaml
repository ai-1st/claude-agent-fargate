AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Claude Agent Fargate — per-session ECS tasks behind a Lambda Function URL

Parameters:
  AppPassword:
    Type: String
    NoEcho: true
    Description: Password to protect the HTMX UI
  ImageUri:
    Type: String
    Description: ECR image URI for the worker container (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/claude-agent-worker:latest)
    Default: ""

Resources:
  # ---------- S3 ----------
  ProjectsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ---------- DynamoDB ----------
  AgentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-table"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ---------- VPC ----------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate tasks egress-only
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  # ---------- ECR ----------
  ECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${AWS::StackName}-worker"
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true

  # ---------- ECS ----------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      CapacityProviders:
        - FARGATE

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WorkerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt AgentTable.Arn
                  - !Sub "${AgentTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${ProjectsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - ssm:GetParametersByPath
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/claude-agent/projects/*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-worker"
      Cpu: "2048"
      Memory: "8192"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Essential: true
          Image: !If
            - HasImageUri
            - !Ref ImageUri
            - !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepo}:latest"
          Environment:
            - Name: TABLE_NAME
              Value: !Ref AgentTable
            - Name: BUCKET_NAME
              Value: !Ref ProjectsBucket
            - Name: CLAUDE_CODE_USE_BEDROCK
              Value: "1"
            - Name: ANTHROPIC_MODEL
              Value: us.anthropic.claude-opus-4-6-v1
          LogConfiguration:
            LogDriver: awslogs
            Options:
              mode: non-blocking
              max-buffer-size: 25m
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}-worker"
      RetentionInDays: 30

  # ---------- Lambda ----------
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      Handler: handler.handler
      Runtime: nodejs20.x
      Architectures:
        - arm64
      CodeUri: src/lambda/
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentTable
          BUCKET_NAME: !Ref ProjectsBucket
          CLUSTER_ARN: !GetAtt ECSCluster.Arn
          TASK_DEF_ARN: !Ref TaskDefinition
          SUBNET_IDS: !Sub "${PublicSubnet1},${PublicSubnet2}"
          SG_ID: !GetAtt TaskSecurityGroup.GroupId
          APP_PASSWORD: !Ref AppPassword
          LOG_GROUP_NAME: !Ref WorkerLogGroup
          LOG_STREAM_PREFIX: worker
          LOG_CONTAINER_NAME: worker
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub "${AgentTable.Arn}/index/*"
        - Statement:
            - Effect: Allow
              Action:
                - ecs:RunTask
              Resource: !Ref TaskDefinition
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource:
                - !GetAtt TaskExecutionRole.Arn
                - !GetAtt TaskRole.Arn
            - Effect: Allow
              Action:
                - logs:GetLogEvents
                - logs:DescribeLogStreams
              Resource:
                - !GetAtt WorkerLogGroup.Arn
                - !Sub "${WorkerLogGroup.Arn}:*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

Conditions:
  HasImageUri: !Not [!Equals [!Ref ImageUri, ""]]

Outputs:
  FunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  TableName:
    Description: DynamoDB table name
    Value: !Ref AgentTable
  BucketName:
    Description: S3 bucket for projects
    Value: !Ref ProjectsBucket
  ECRRepoUri:
    Description: ECR repository URI
    Value: !GetAtt ECRRepo.RepositoryUri
  ClusterArn:
    Description: ECS cluster ARN
    Value: !GetAtt ECSCluster.Arn
  TaskDefArn:
    Description: ECS task definition ARN
    Value: !Ref TaskDefinition
