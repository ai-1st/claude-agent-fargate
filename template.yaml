AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ClaudeClaw — serverless agent platform; per-message Lambda worker, S3 Files mount, EventBridge sleep/wake

Parameters:
  AppPassword:
    Type: String
    NoEcho: true
    Description: Password to protect the HTMX UI (also used as heartbeat secret)
  ImageUri:
    Type: String
    Description: ECR image URI for the worker container (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/claude-agent-worker:latest)
    Default: ""
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC for worker Lambda + S3 Files mount targets
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two subnets in different AZs with egress to Bedrock/DynamoDB/SSM/Lambda (NAT or VPC endpoints assumed already present)
  ExtChromeId:
    Type: String
    Description: Chrome extension ID (stable, derived from manifest "key") used by the "Open in Extension" redirect
    Default: ""

Resources:
  # ---------- S3 ----------
  ProjectsBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        # Required by S3 Files (it tracks object versions for sync).
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ---------- DynamoDB ----------
  AgentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-table"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ---------- VPC plumbing for the worker Lambda ----------
  WorkerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ClaudeClaw worker Lambda
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0

  MountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: NFS ingress for S3 Files mount targets
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref WorkerSecurityGroup

  # ---------- S3 Files (managed; no self-provisioned EFS) ----------
  S3FilesServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # S3 Files is implemented on top of EFS; CFN passes the role to
              # the elasticfilesystem service principal (see iam:PassedToService
              # in AWS-managed policy AmazonS3FilesFullAccess).
              Service: elasticfilesystem.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObjectAttributes
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                Resource:
                  - !GetAtt ProjectsBucket.Arn
                  - !Sub "${ProjectsBucket.Arn}/*"

  S3FileSystem:
    Type: AWS::S3Files::FileSystem
    Properties:
      Bucket: !GetAtt ProjectsBucket.Arn
      RoleArn: !GetAtt S3FilesServiceRole.Arn
      ClientToken: !Sub "${AWS::StackName}-fs"
      AcceptBucketWarning: true

  S3FileSystemMountTarget1:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !Ref S3FileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  S3FileSystemMountTarget2:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !Ref S3FileSystem
      SubnetId: !Select [1, !Ref SubnetIds]
      SecurityGroups:
        - !Ref MountTargetSecurityGroup

  S3FileSystemAccessPoint:
    Type: AWS::S3Files::AccessPoint
    Properties:
      FileSystemId: !Ref S3FileSystem
      ClientToken: !Sub "${AWS::StackName}-ap-v2"
      PosixUser:
        Uid: 1001
        Gid: 1001
      RootDirectory:
        Path: /lambda
        CreationPermissions:
          OwnerUid: "1001"
          OwnerGid: "1001"
          Permissions: "750"

  # ---------- Worker Lambda (container image) ----------
  # NOTE: ECR repo `${AWS::StackName}-worker` is bootstrapped in scripts/deploy.sh
  # (chicken-and-egg: Lambda needs the image to exist at create time).
  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-worker"
      RetentionInDays: 30

  WorkerFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - S3FileSystemMountTarget1
      - S3FileSystemMountTarget2
    Properties:
      FunctionName: !Sub "${AWS::StackName}-worker"
      PackageType: Image
      ImageUri: !If
        - HasImageUri
        - !Ref ImageUri
        - !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${AWS::StackName}-worker:latest"
      Architectures:
        - arm64
      MemorySize: 10240
      Timeout: 900
      EphemeralStorage:
        Size: 10240
      VpcConfig:
        SecurityGroupIds:
          - !Ref WorkerSecurityGroup
        SubnetIds: !Ref SubnetIds
      FileSystemConfigs:
        - Arn: !GetAtt S3FileSystemAccessPoint.AccessPointArn
          LocalMountPath: /mnt/s3
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentTable
          BUCKET_NAME: !Ref ProjectsBucket
          S3_MOUNT: /mnt/s3
          WORKER_FUNCTION_NAME: !Sub "${AWS::StackName}-worker"
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerExecutionRole.Arn
          STACK_NAME: !Ref AWS::StackName
          CLAUDE_CODE_USE_BEDROCK: "1"
          ANTHROPIC_MODEL: us.anthropic.claude-opus-4-6-v1
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub "${AgentTable.Arn}/index/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:GetObjectVersion
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - !GetAtt ProjectsBucket.Arn
                - !Sub "${ProjectsBucket.Arn}/*"
            - Effect: Allow
              Action:
                - ssm:GetParametersByPath
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/claude-agent/projects/*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-worker"
            - Effect: Allow
              Action:
                - scheduler:CreateSchedule
                - scheduler:UpdateSchedule
                - scheduler:DeleteSchedule
                - scheduler:GetSchedule
              Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/${AWS::StackName}-wake-*"
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: !GetAtt SchedulerExecutionRole.Arn
            # Per AWS docs (configuration-filesystem-s3files), s3files:ClientMount/
            # ClientWrite must be on Resource "*" — not the access-point ARN.
            - Effect: Allow
              Action:
                - s3files:ClientMount
                - s3files:ClientWrite
              Resource: "*"

  # ---------- Scheduler IAM ----------
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeFunctions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-api"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-api:*"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-worker"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-worker:*"

  # ---------- API Lambda (Function URL, no VPC) ----------
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      Handler: handler.handler
      Runtime: nodejs22.x
      Architectures:
        - arm64
      CodeUri: src/lambda/
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref AgentTable
          BUCKET_NAME: !Ref ProjectsBucket
          WORKER_FUNCTION_NAME: !Sub "${AWS::StackName}-worker"
          APP_PASSWORD: !Ref AppPassword
          STACK_NAME: !Ref AWS::StackName
          SCHEDULER_ROLE_ARN: !GetAtt SchedulerExecutionRole.Arn
          FUNCTION_ARN: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-api"
          EXT_CHROME_ID: !Ref ExtChromeId
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AgentTable
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub "${AgentTable.Arn}/index/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - !GetAtt ProjectsBucket.Arn
                - !Sub "${ProjectsBucket.Arn}/*"
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-worker"
        - Statement:
            - Effect: Allow
              Action:
                - scheduler:CreateSchedule
                - scheduler:UpdateSchedule
                - scheduler:DeleteSchedule
                - scheduler:GetSchedule
                - scheduler:ListSchedules
              Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/${AWS::StackName}-*"
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: !GetAtt SchedulerExecutionRole.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - handler.ts
        External:
          - "@aws-sdk/*"
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

Conditions:
  HasImageUri: !Not [!Equals [!Ref ImageUri, ""]]

Outputs:
  FunctionUrl:
    Description: Lambda Function URL
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
  TableName:
    Description: DynamoDB table name
    Value: !Ref AgentTable
  BucketName:
    Description: S3 bucket for projects + memory
    Value: !Ref ProjectsBucket
  ECRRepoUri:
    Description: ECR repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${AWS::StackName}-worker"
  WorkerFunctionName:
    Description: Worker Lambda function name
    Value: !Sub "${AWS::StackName}-worker"
  SchedulerRoleArn:
    Description: IAM role used by EventBridge Scheduler to invoke Lambda functions
    Value: !GetAtt SchedulerExecutionRole.Arn
